<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="Head">
        <div class="content">
            <p class="intro">Get in touch with us by filling contact form below</p>
            <form action="" method="post" class="form_contact">
                <div class="form_contact--info">
                    <input type="text" placeholder="*Enter your full name" name="full_name" class="full_name height_form">
                    <input type="email" placeholder="*mail" name="email" class="email height_form">
                </div>
                <input type="text" placeholder="*Enter your subject" name="subject" class="subject height_form">
                <textarea name="message" id="message" placeholder="*Your message here..."></textarea>
                <div class="submit_form">
                <button type="submit">Send message</button>
                <p>*Please fill all require form field, thanks!</p>
            </div>
            </form>

        </div>
    </div>
</body>

</html>
